<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes App - Modern</title>
    <style>
        /* CSS Reset & Variabel Global */
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --danger: #ef4444;
            --danger-hover: #dc2626;
            --warning: #f59e0b;
            --warning-hover: #d97706;
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-muted: #6b7280;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header h1 {
            color: var(--primary);
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        /* Form Input */
        .form-card {
            background-color: var(--card-bg);
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            margin-bottom: 2rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        input[type="text"], textarea {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        input[type="text"]:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.2);
        }

        /* Tombol */
        button {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            color: white;
        }

        button:active {
            transform: scale(0.98);
        }

        .btn-primary { background-color: var(--primary); width: 100%; }
        .btn-primary:hover { background-color: var(--primary-hover); }

        .btn-edit { background-color: var(--warning); padding: 0.5rem 1rem; font-size: 0.875rem; }
        .btn-edit:hover { background-color: var(--warning-hover); }

        .btn-delete { background-color: var(--danger); padding: 0.5rem 1rem; font-size: 0.875rem; }
        .btn-delete:hover { background-color: var(--danger-hover); }

        /* Grid Catatan */
        .notes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .note-card {
            background-color: var(--card-bg);
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .note-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .note-title {
            font-size: 1.25rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
            color: var(--text-main);
        }

        .note-body {
            flex-grow: 1;
            margin-bottom: 1rem;
            white-space: pre-wrap; /* Agar enter/newline di textarea terbaca */
        }

        .note-date {
            font-size: 0.875rem;
            color: var(--text-muted);
            margin-bottom: 1rem;
            border-top: 1px solid #e5e7eb;
            padding-top: 0.5rem;
        }

        .note-actions {
            display: flex;
            gap: 0.5rem;
            justify-content: flex-end;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>📝 Notes App</h1>
            <p>Tugas 2 Al Faarray 123230109</p>
        </div>
        
        <div class="form-card">
            <div class="form-group">
                <input type="hidden" id="noteId">
                <input type="text" id="judul" placeholder="Tulis judul catatan di sini..." required>
                <textarea id="isi" rows="4" placeholder="Tulis isi catatanmu di sini..." required></textarea>
                <button class="btn-primary" onclick="saveNote()" id="saveBtn">Simpan Catatan</button>
            </div>
        </div>

        <div id="notesContainer" class="notes-grid">
            </div>
    </div>

<script>
        const API_URL = 'http://localhost:3000/api/notes';
        
        // Kita buat variabel global untuk menyimpan data catatan sementara
        let allNotes = [];

        document.addEventListener('DOMContentLoaded', fetchNotes);

        async function fetchNotes() {
            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error('Gagal terhubung ke API');
                
                // Simpan data dari database ke variabel global
                allNotes = await response.json(); 
                
                const container = document.getElementById('notesContainer');
                container.innerHTML = '';
                
                if (allNotes.length === 0) {
                    container.innerHTML = '<p style="text-align:center; grid-column: 1 / -1; color: var(--text-muted);">Belum ada catatan. Silakan buat catatan baru!</p>';
                    return;
                }

                allNotes.forEach(note => {
                    // Validasi tanggal agar tidak error jika dari database kosong/null
                    let formattedDate = 'Tanggal tidak diketahui';
                    if (note.tanggal_dibuat) {
                        const dateObj = new Date(note.tanggal_dibuat);
                        if (!isNaN(dateObj)) {
                            formattedDate = dateObj.toLocaleDateString('id-ID', { 
                                weekday: 'long', year: 'numeric', month: 'long', day: 'numeric',
                                hour: '2-digit', minute: '2-digit'
                            });
                        }
                    }

                    // Tampilkan HTML, di tombol Edit kita HANYA memanggil ID-nya saja (sangat aman)
                    container.innerHTML += `
                        <div class="note-card">
                            <div class="note-title">${note.judul || ''}</div>
                            <div class="note-body">${note.isi || ''}</div>
                            <div class="note-date">🕒 ${formattedDate}</div>
                            <div class="note-actions">
                                <button class="btn-edit" onclick="editNote(${note.id})">Edit</button>
                                <button class="btn-delete" onclick="deleteNote(${note.id})">Hapus</button>
                            </div>
                        </div>
                    `;
                });
            } catch (error) {
                console.error('Error detail:', error);
                alert('Terjadi kesalahan saat memuat data catatan. Coba cek console (F12).');
            }
        }

        async function saveNote() {
            const id = document.getElementById('noteId').value;
            const judul = document.getElementById('judul').value;
            const isi = document.getElementById('isi').value;

            if (!judul.trim() || !isi.trim()) {
                return alert('Judul dan isi catatan tidak boleh kosong!');
            }

            const method = id ? 'PUT' : 'POST';
            const url = id ? `${API_URL}/${id}` : API_URL;

            try {
                await fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ judul, isi })
                });

                // Kosongkan form setelah simpan
                document.getElementById('noteId').value = '';
                document.getElementById('judul').value = '';
                document.getElementById('isi').value = '';
                document.getElementById('saveBtn').innerHTML = 'Simpan Catatan';
                
                fetchNotes();
            } catch (error) {
                console.error('Error menyimpan catatan:', error);
                alert('Terjadi kesalahan saat menyimpan catatan.');
            }
        }

        function editNote(id) {
            // Cari data catatan dari variabel allNotes berdasarkan ID
            const note = allNotes.find(n => n.id === id);
            
            if (note) {
                // Masukkan data ke dalam form
                document.getElementById('noteId').value = note.id;
                document.getElementById('judul').value = note.judul;
                document.getElementById('isi').value = note.isi;
                document.getElementById('saveBtn').innerHTML = 'Update Catatan';
                
                // Scroll ke atas
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        async function deleteNote(id) {
            if (confirm('Apakah kamu yakin ingin menghapus catatan ini?')) {
                try {
                    await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
                    fetchNotes();
                } catch (error) {
                    console.error('Error menghapus catatan:', error);
                }
            }
        }
    </script>
</body>
</html>
